<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Eco Quiz Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1>🌱 Eco Quiz</h1>

    <input id="name" placeholder="Nhập tên...">
    <br>

    <button id="startBtn">🚀 Bắt đầu</button>
    <button id="stopBtn">⏹ Dừng</button>

    <h3 id="timer"></h3>

    <div id="quiz"></div>

    <h2 id="result"></h2>

    <h2>🏆 TOP 10</h2>
    <ul id="leaderboard"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
